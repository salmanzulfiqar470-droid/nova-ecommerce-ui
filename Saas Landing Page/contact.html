<section class="contact-section">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="contact-box">

<div class="row g-4">

<div class="col-md-6">

>

</div>

<div class="col-md-6">

<input
type="email"
placeholder="Your Email"
class="form-control"
>

</div>

<div class="col-12">

<textarea
rows="6"
placeholder="Your Message"
class="form-control"
></textarea>

</div>

<div class="col-12">

<button class="btn btn-primary">
Send Message
</button>

</div>
